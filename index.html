<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Electoral Manual</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --accent: #3498db;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        
        .input-section { margin-bottom: 30px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; resize: vertical; font-family: monospace; box-sizing: border-box; }
        
        .controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-process { background: var(--accent); color: white; flex-grow: 1; }
        .btn-process:hover { background: #2980b9; }
        .btn-clear { background: #95a5a6; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f2f2f2; text-align: left; padding: 15px; border-bottom: 2px solid #ddd; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        
        .diff-up { color: var(--success); font-weight: bold; }
        .diff-down { color: var(--danger); font-weight: bold; }
        .diff-new { color: var(--accent); font-style: italic; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; }
        .up-bg { background: #eafaf1; }
        .down-bg { background: #fdedec; }
        
        small { color: #666; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗳️ Procesador de Datos Electorales</h1>

    <div class="input-section">
        <label><strong>Pega el JSON de respuesta aquí:</strong></label>
        <textarea id="json-input" placeholder='{"success":true, "data": [...]}'></textarea>
        <div class="controls">
            <button class="btn-process" onclick="procesarManual()">📊 Procesar y Comparar Porcentajes</button>
            <button class="btn-clear" onclick="limpiarTodo()">🗑️ Resetear Historial</button>
        </div>
    </div>

    <table id="main-table" style="display: none;">
        <thead>
            <tr>
                <th>Candidato / Partido</th>
                <th>Votos</th>
                <th>% Actual</th>
                <th>Variación</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
    </table>
</div>

<script>
    const STORAGE_KEY = 'comparador_electoral_data';

    function procesarManual() {
        const rawInput = document.getElementById('json-input').value.trim();
        if (!rawInput) return alert("Por favor, pega el contenido JSON.");

        try {
            const parsed = JSON.parse(rawInput);
            const data = parsed.data || [];
            
            if (data.length === 0) throw new Error("No se encontraron candidatos en la propiedad 'data'.");

            renderizarResultados(data);
            document.getElementById('main-table').style.display = 'table';
            document.getElementById('json-input').value = ''; // Limpiar para la próxima
        } catch (e) {
            alert("Error al leer el JSON: " + e.message);
        }
    }

    function renderizarResultados(dataActual) {
        const tbody = document.getElementById('tabla-body');
        const historial = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        
        tbody.innerHTML = '';

        // Ordenar por más votados
        dataActual.sort((a, b) => b.totalVotosValidos - a.totalVotosValidos);

        dataActual.forEach(c => {
            const id = c.dniCandidato;
            const pctActual = parseFloat(c.porcentajeVotosValidos);
            const tieneHistorial = historial[id] !== undefined;
            const pctAnterior = tieneHistorial ? historial[id] : pctActual;
            
            const diff = (pctActual - pctAnterior).toFixed(3);
            
            let htmlDiff = '';
            if (!tieneHistorial) {
                htmlDiff = '<span class="diff-new">Nuevo registro</span>';
            } else if (diff > 0) {
                htmlDiff = `<span class="diff-up badge up-bg">▲ +${diff}%</span>`;
            } else if (diff < 0) {
                htmlDiff = `<span class="diff-down badge down-bg">▼ ${diff}%</span>`;
            } else {
                htmlDiff = `<span style="color:#999">No cambió</span>`;
            }

            const fila = `
                <tr>
                    <td>
                        <strong>${c.nombreCandidato}</strong>
                        <small>${c.nombreAgrupacionPolitica}</small>
                    </td>
                    <td>${c.totalVotosValidos.toLocaleString()}</td>
                    <td><strong>${pctActual}%</strong></td>
                    <td>${htmlDiff}</td>
                    <td>
                        <button onclick="borrarUno('${id}')" style="font-size:10px">Borrar Ref.</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += fila;

            // Actualizar historial con el nuevo valor
            historial[id] = pctActual;
        });

        localStorage.setItem(STORAGE_KEY, JSON.stringify(historial));
    }

    function borrarUno(dni) {
        let historial = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        delete historial[dni];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(historial));
        alert("Referencia borrada para este candidato. En el próximo proceso aparecerá como 'Nuevo'.");
    }

    function limpiarTodo() {
        if (confirm("¿Borrar toda la memoria de comparación?")) {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('tabla-body').innerHTML = '';
            document.getElementById('main-table').style.display = 'none';
        }
    }
</script>

</body>
</html>
